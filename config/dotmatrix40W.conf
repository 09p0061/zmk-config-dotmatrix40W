# ============================================================
# dotmatrix40W - User Configuration
# ============================================================

# --- Deep Sleep (battery saving) ---
# When the keyboard is left unused, it automatically enters deep sleep to conserve battery.
# Timeline after the last keypress:
#   5 min  → enters idle state
#   15 min → enters deep sleep (Bluetooth disconnected, ultra-low power)
# To wake up, press any key. The first keypress wakes the keyboard and is not sent to the host.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=300000        # 5 min  (milliseconds) - time before idle state
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000  # 10 min (milliseconds) - additional time before deep sleep

# --- Backlight Auto-Off ---
# While connected via USB: backlight stays on at all times.
# When switched to Bluetooth (USB disconnected): backlight turns off immediately.
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=y

# --- Bluetooth Transmit Power ---
# Reduces BT radio output from 0 dBm (default) to -4 dBm for slightly lower power consumption.
# Effective for typical desktop use within ~1 m of the host device.
CONFIG_BT_CTLR_TX_PWR_MINUS_4=y
